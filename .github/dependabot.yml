version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/London
    open-pull-requests-limit: 10
    groups:
      npm-production:
        dependency-type: production
      npm-development:
        dependency-type: development
    ignore:
      # matrix-bot-sdk still depends on deprecated request/request-promise.
      # Keep Dependabot active, but expect this family to need upstream work.
      - dependency-name: request
      - dependency-name: request-promise

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:15'
      timezone: Europe/London
    open-pull-requests-limit: 5
